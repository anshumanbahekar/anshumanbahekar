name: Metrics Subparts

on:
schedule:
- cron: "30 0 * * *"
workflow_dispatch:

jobs:
github-metrics-subparts:
runs-on: ubuntu-latest

```
permissions:
  contents: write

steps:

  # ==========================================
  # PROFILE
  # ==========================================
  - uses: lowlighter/metrics@latest
    with:
      token: ${{ secrets.METRICS_TOKEN }}
      filename: metrics-profile.svg

      base: header, metadata

      plugin_people: yes
      plugin_followup: yes
      plugin_gists: yes
      plugin_licenses: yes

  # ==========================================
  # CALENDAR
  # ==========================================
  - uses: lowlighter/metrics@latest
    with:
      token: ${{ secrets.METRICS_TOKEN }}
      filename: metrics-calendar.svg

      base: metadata

      plugin_calendar: yes

      plugin_isocalendar: yes
      plugin_isocalendar_duration: full-year

  # ==========================================
  # REPOSITORIES
  # ==========================================
  - uses: lowlighter/metrics@latest
    with:
      token: ${{ secrets.METRICS_TOKEN }}
      filename: metrics-repositories.svg

      base: metadata

      plugin_stargazers: yes
      plugin_stargazers_charts: yes

      plugin_stars: yes
      plugin_stars_limit: 4

      plugin_starlists: yes

      plugin_notable: yes

      plugin_contributors: yes

  # ==========================================
  # DEVELOPMENT
  # ==========================================
  - uses: lowlighter/metrics@latest
    with:
      token: ${{ secrets.METRICS_TOKEN }}
      filename: metrics-development.svg

      base: metadata

      plugin_languages: yes
      plugin_languages_limit: 8
      plugin_languages_threshold: "0%"

      plugin_lines: yes

      plugin_code: yes

      plugin_wakatime: yes
      plugin_wakatime_token: ${{ secrets.WAKATIME_TOKEN }}
      plugin_wakatime_days: "30"
      plugin_wakatime_sections: time, projects, languages, editors

  # ==========================================
  # COMMUNITY
  # ==========================================
  - uses: lowlighter/metrics@latest
    with:
      token: ${{ secrets.METRICS_TOKEN }}
      filename: metrics-community.svg

      base: metadata

      plugin_discussions: yes

      plugin_reactions: yes

  # ==========================================
  # LEARNING
  # ==========================================
  - uses: lowlighter/metrics@latest
    with:
      token: ${{ secrets.METRICS_TOKEN }}
      filename: metrics-learning.svg

      base: metadata

      plugin_leetcode: yes
      plugin_leetcode_user: anshumanbahekar

      plugin_stackoverflow: yes
      plugin_stackoverflow_user: 16069832

  # ==========================================
  # SUPPORT
  # ==========================================
  - uses: lowlighter/metrics@latest
    with:
      token: ${{ secrets.METRICS_TOKEN }}
      filename: metrics-support.svg

      base: metadata

      plugin_sponsors: yes
      plugin_sponsors_sections: goal, list, about

      plugin_sponsorships: yes

  # ==========================================
  # GROWTH
  # ==========================================
  - uses: lowlighter/metrics@latest
    with:
      token: ${{ secrets.METRICS_TOKEN }}
      filename: metrics-growth.svg

      base: metadata

      plugin_traffic: yes

      plugin_posts: yes
      plugin_posts_source: dev.to
      plugin_posts_user: anshumanbahekar
```
